<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>RandumbRadar Web Installer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script
    type="module"
    src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module">
  </script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0f14;
      color: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: #111822;
      padding: 28px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(133,184,36,0.25);
      border: 1px solid rgba(133,184,36,0.40);
      text-align: center;
    }
    h1 { margin-top: 0; }
    p { line-height: 1.5; }
    .note {
      background: #0b0f14;
      border: 1px solid rgba(133,184,36,0.40);
      border-radius: 10px;
      padding: 14px;
      margin: 20px 0;
      text-align: left;
    }
    a { color: #85b824; font-weight: bold; }
    esp-web-install-button {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="images/RandumbRadar2_Logo.png" alt="RandumbRadar2" width="291" height="295">
    <p>Install RandumbRadar 2.0 onto your ESP32 device.</p>

    <div class="note">
      <p><strong>Before installing:</strong></p>
      <p>Use a Chromium-based browser such as Chrome or Edge.</p>
      <p>Connect your ESP32 by USB, then click Install.</p>
      <p>After flashing, connect to the <strong>RandumbRadar</strong> WIFI Connection and go to <strong>192.168.77.1</strong>.</p>
    </div>

    <esp-web-install-button manifest="manifest.json">
      <button slot="activate">Install RandumbRadarOS</button>
    </esp-web-install-button>
  </div>
</body>
</html>
